name: CI

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high
